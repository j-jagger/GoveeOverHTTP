<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/extras.css">
    <title id="title">GoveeOverHTTP</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark-subtle shadow-lg">
        <div class="container-fluid">
            <h1 class="mb-0">GoveeOverHTTP</h1>
            <a class="btn btn-primary glow" href="https://github.com/j-jagger/GoveeOverHTTP" target="_blank">View on
                GitHub</a>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row">
            <div class="col-md-8">
                <h1 class="mt-4">Available Interfaces</h1>
                <p>Currently connected to: <a id="hostname"></a></p>


                <div class="mb-3 form-check">
                    <input class="form-check-input" type="checkbox" id="powerState">
                    <label class="form-check-label" for="powerState">Power</label>
                </div>


                <div class="mb-3">
                    <label for="brightnessSlider" class="form-label">Brightness</label>
                    <input type="range" class="form-range" id="brightnessSlider" min="0" max="100">
                </div>


                <div class="mt-3">
                    <label for="colourPicker" class="form-label">Colour</label>
                    <input class="form-control form-control-color" type="color" id="colourPicker" value="#0b0b0b"
                        title="Choose your colour">
                    <p class="my-3">Click this box to open the colour picker.</p>
                </div>

            </div>
            <div class="col-md-4">
                <div class="card shadow-lg bg-gradient border-dark">
                    <p class="ms-1 mt-1 mb-1">Command Output:</p>
                    <code id="commandoutput" class="card-body"
                        style="background-color: black; min-height:20rem; max-height:20rem; overflow-y: scroll;">



                    </code>
                </div>
            </div>
        </div>


    </main>

    <script src="/static/app.js">
    </script>
</body>

</html>
